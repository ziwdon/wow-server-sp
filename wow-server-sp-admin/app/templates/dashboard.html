{% extends "base.html" %}
{% block main %}
<div class="dashboard-content">

  <div class="stat-row">
    <div id="status" hx-get="/api/status" hx-trigger="load, every 10s, refresh">
      <div class="stat-card"><div class="stat-label">Server Status</div><div class="stat-value" style="color:var(--text-muted)">Loading…</div></div>
    </div>
    <div id="stats" hx-get="/api/stats" hx-trigger="load, every 10s, refresh">
      <div class="stat-card"><div class="stat-label">Resources</div><div class="stat-value" style="color:var(--text-muted)">Loading…</div></div>
    </div>
    <div id="players" hx-get="/api/players" hx-trigger="load, every 10s, refresh">
      <div class="stat-card"><div class="stat-label">Online</div><div class="stat-value" style="color:var(--text-muted)">Loading…</div></div>
    </div>
    <div id="backups" hx-get="/api/backups" hx-trigger="load, every 10s, refresh">
      <div class="stat-card"><div class="stat-label">Last Backup</div><div class="stat-value" style="color:var(--text-muted)">Loading…</div></div>
    </div>
  </div>

  <div class="action-bar">
    <button class="btn btn-green"
            data-action-endpoint="/api/action/start"
            data-action-label="Start"
            data-action-confirm="Start the server?">Start</button>
    <button class="btn btn-gold"
            data-action-endpoint="/api/action/restart"
            data-action-label="Restart"
            data-action-confirm="Restart the server? Same shutdown path as Stop, then start.">Restart</button>
    <button class="btn btn-gold"
            data-action-endpoint="/api/action/stop"
            data-action-label="Stop"
            data-action-confirm="Stop the server? Players get a 30-second warning, then saveall + clean shutdown.">Stop</button>
    <div class="action-divider"></div>
    <button class="btn btn-danger"
            data-action-endpoint="/api/action/force-stop"
            data-action-label="Force Stop"
            data-action-confirm="FORCE STOP — no notify, no saveall, no backup. Only use if soft stop is hung. Continue?">Force Stop</button>
  </div>

  <div class="lower-grid">
    <div id="logs" class="panel" hx-get="/api/logs" hx-trigger="load">
      <div class="stat-card"><div class="stat-label">Logs</div><div class="stat-value" style="color:var(--text-muted)">Loading…</div></div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Server Activity</span>
      </div>
      <div class="panel-body" hx-ext="sse" sse-connect="/api/action/stream">
        <ul id="action-log"
            sse-swap="progress,done"
            hx-swap="beforeend">
        </ul>
      </div>
    </div>
  </div>

</div>
<script>
function switchLog(btn, targetId) {
  var logs = btn.closest('#logs');
  if (!logs) return;
  logs.querySelectorAll('.log-tab').forEach(function(t) {
    var selected = t === btn;
    t.classList.remove('active');
    t.setAttribute('aria-selected', selected ? 'true' : 'false');
    t.setAttribute('tabindex', selected ? '0' : '-1');
  });
  logs.querySelectorAll('.logview').forEach(function(p) { p.style.display = 'none'; });
  btn.classList.add('active');
  var el = logs.querySelector('#' + targetId);
  if (el) el.style.display = '';
}

function filterAppEvents(button, severity) {
  var logs = button.closest('#logs');
  if (!logs) return;
  logs.querySelectorAll('.app-event-filter').forEach(function(filter) {
    var selected = filter === button;
    filter.classList.toggle('active', selected);
    filter.setAttribute('aria-pressed', selected ? 'true' : 'false');
  });
  logs.querySelectorAll('.app-event-row').forEach(function(row) {
    row.hidden = severity !== 'all' && row.dataset.eventSeverity !== severity;
  });
}

function activateRequestedAppEvent() {
  var url = new URL(window.location.href);
  var incidentId = url.searchParams.get('app_event');
  if (!incidentId || !/^EVT-[A-Z0-9-]{1,64}$/.test(incidentId)) return;
  var logs = document.getElementById('logs');
  if (!logs) return;
  var match = Array.from(logs.querySelectorAll('.app-event-row')).find(function(row) {
    return row.dataset.incidentId === incidentId;
  });
  if (!match) return;
  var tab = logs.querySelector(".log-tab[aria-controls='app-events-log']");
  if (!tab) return;
  switchLog(tab, 'app-events-log');
  match.focus({ preventScroll: true });
  match.scrollIntoView({ block: 'nearest' });
  url.searchParams.delete('app_event');
  window.history.replaceState(window.history.state, '', url.pathname + url.search + url.hash);
}

// Refresh logs while keeping whichever tab is currently active.
// Registers a one-shot htmx:afterSettle listener on #logs BEFORE firing the
// request, so switchLog always runs on the fully-settled new DOM regardless
// of whether htmx.ajax() returns a Promise.
function refreshLogsPreservingTab() {
  var logsEl = document.getElementById('logs');
  var active = logsEl.querySelector('.log-tab.active');
  var m = active && active.getAttribute('onclick').match(/switchLog\(this,\s*'([^']+)'\)/);
  var tabId = m ? m[1] : 'server-log';

  logsEl.addEventListener('htmx:afterSettle', function handler() {
    logsEl.removeEventListener('htmx:afterSettle', handler);
    var btn = logsEl.querySelector(".log-tab[onclick*=\"'" + tabId + "'\"]");
    if (btn) switchLog(btn, tabId);
    activateRequestedAppEvent();
  }, { once: true });

  htmx.ajax('GET', '/api/logs', {target: '#logs', swap: 'innerHTML'});
}

var logsRoot = document.getElementById('logs');
logsRoot.addEventListener('htmx:afterSettle', function() {
  activateRequestedAppEvent();
}, { once: true });

logsRoot.addEventListener('keydown', function(event) {
  var current = event.target.closest('.log-tab');
  if (!current || !logsRoot.contains(current)) return;
  var tabs = Array.from(logsRoot.querySelectorAll('.log-tabs [role="tab"]'));
  var index = tabs.indexOf(current);
  var nextIndex;
  if (event.key === 'ArrowRight') nextIndex = (index + 1) % tabs.length;
  else if (event.key === 'ArrowLeft') nextIndex = (index - 1 + tabs.length) % tabs.length;
  else if (event.key === 'Home') nextIndex = 0;
  else if (event.key === 'End') nextIndex = tabs.length - 1;
  else return;
  event.preventDefault();
  var next = tabs[nextIndex];
  switchLog(next, next.getAttribute('aria-controls'));
  next.focus();
});

// Keep the prior activity visible when a request is rejected. Once the server
// accepts a new action id, replace the log with that action's progress.
document.querySelectorAll('[data-action-endpoint]').forEach(function (button) {
  button.addEventListener('click', async function () {
    var confirmMsg = button.dataset.actionConfirm;
    if (confirmMsg && !window.confirm(confirmMsg)) return;
    button.disabled = true;
    try {
      var result = await window.requestActionJson(button.dataset.actionEndpoint, { method: 'POST' });
      if (!result.ok) {
        window.showActionFailure(button.dataset.actionLabel, result);
        return;
      }
      if (!result.data || !result.data.id) {
        window.showActionFailure(button.dataset.actionLabel, {
          message: 'The server accepted no action id. Refresh the page and try again.',
        });
        return;
      }
      document.getElementById('action-log').innerHTML = '';
    } finally {
      button.disabled = false;
    }
  });
});

// On SSE progress events: debounced status-card refresh so the running/exited
// state updates during long stop/restart sequences without hammering the API.
// On SSE done events: refresh all four stat cards immediately.
var _sseStatusTimer;
document.addEventListener('htmx:sseMessage', function(e) {
  if (!e.detail) return;
  if (e.detail.type === 'progress') {
    clearTimeout(_sseStatusTimer);
    _sseStatusTimer = setTimeout(function() {
      var el = document.getElementById('status');
      if (el) htmx.trigger(el, 'refresh');
    }, 2000);
  } else if (e.detail.type === 'done') {
    clearTimeout(_sseStatusTimer);
    ['status', 'stats', 'players', 'backups'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) htmx.trigger(el, 'refresh');
    });
  }
});
</script>
{% endblock %}
