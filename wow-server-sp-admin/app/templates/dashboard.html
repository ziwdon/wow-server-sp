{% extends "base.html" %}
{% block main %}
<section class="grid">
  <div id="status" hx-get="/api/status" hx-trigger="load, every 60s">
    <p>Loading status...</p>
  </div>
  <div id="stats" hx-get="/api/stats" hx-trigger="load, every 60s">
    <p>Loading stats...</p>
  </div>
  <div id="players" hx-get="/api/players" hx-trigger="load, every 60s">
    <p>Loading player counts...</p>
  </div>
  <div id="logs" hx-get="/api/logs" hx-trigger="load">
    <p>Loading logs...</p>
  </div>
  <div id="backups" hx-get="/api/backups" hx-trigger="load, every 60s">
    <p>Loading backup status...</p>
  </div>
</section>

<section class="actions">
  <button hx-post="/api/action/stop"
          hx-confirm="Stop the server? Players get a 30-second warning, then saveall + clean shutdown + backup."
          hx-swap="none">Stop</button>
  <button hx-post="/api/action/restart"
          hx-confirm="Restart the server? Same shutdown path as Stop, then start."
          hx-swap="none">Restart</button>
  <button hx-post="/api/action/start"
          hx-confirm="Start the server?"
          hx-swap="none">Start</button>
  <button hx-post="/api/action/force-stop"
          hx-confirm="FORCE STOP — no notify, no saveall, no backup. Only use if soft stop is hung. Continue?"
          hx-swap="none" class="danger">Force stop</button>
</section>

<section>
  <h2>Action log</h2>
  <ul id="action-log"
      hx-ext="sse"
      sse-connect="/api/action/stream"
      sse-swap="progress,done"
      hx-swap="beforeend">
    <!-- The initial idle/replay event fills this; subsequent progress events append. -->
  </ul>
</section>

<nav><a href="/settings">Settings →</a></nav>
{% endblock %}
