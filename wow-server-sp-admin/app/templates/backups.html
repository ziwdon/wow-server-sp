{% extends "base.html" %}
{% block main %}
<div class="dashboard-content">

  <div id="backups-list" class="backups-wrap"
       hx-get="/api/backups/list" hx-trigger="load, refresh">
    <div class="stat-card"><div class="stat-label">Backups</div><div class="stat-value" style="color:var(--text-muted)">Loading…</div></div>
  </div>

  <div class="action-bar">
    <button class="btn btn-green"
            hx-post="/api/action/backup"
            hx-confirm="Create a full backup now?"
            hx-swap="none">+ Create backup</button>
    <button class="btn btn-gold" id="restore-btn" disabled
            hx-confirm="RESTORE this backup? The whole server is rolled back to the selected point — characters, items, gold, auctions, and accounts created after it will be permanently LOST. The server will be stopped and unavailable for several minutes while databases reimport (including the large world DB). A pre-restore safety backup is taken first so this can be undone. Continue?"
            hx-swap="none">⟲ Restore selected</button>
  </div>

  <div class="panel">
    <div class="panel-header"><span class="panel-title">Activity</span></div>
    <div class="panel-body" hx-ext="sse" sse-connect="/api/action/stream">
      <ul id="action-log" sse-swap="progress,done" hx-swap="beforeend"></ul>
    </div>
  </div>

</div>
<script src="/static/backups.js?v={{ backups_js_ver }}" defer></script>
{% endblock %}
