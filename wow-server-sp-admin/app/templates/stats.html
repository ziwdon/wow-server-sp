{% extends "base.html" %}
{% block main %}
<div class="dashboard-content stats-page">

  <div class="stats-toolbar">
    <button class="btn btn-gold" id="refresh-stats-btn">⟳ Refresh</button>
    <span id="stats-last-refreshed" class="stats-last">—</span>
    <span id="stats-spinner" class="stats-spinner" style="display:none">refreshing…</span>
  </div>

  <div id="stats-data"
       hx-get="/api/stats/data"
       hx-trigger="load"
       hx-swap="innerHTML">
    <p class="loading">Loading stats…</p>
  </div>

</div>

<script src="/static/stats.js?v={{ stats_js_ver }}" defer></script>
{% endblock %}
