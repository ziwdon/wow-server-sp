{% extends "base.html" %}
{% block main %}
<div class="settings-page">

  <aside class="settings-sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Search</div>
      <input class="search-input" type="text" id="search" placeholder="Key, value, or comment…">
    </div>

    <button class="mobile-filter-toggle" id="mobile-filter-toggle">⚙ Filters ▼</button>

    <div class="mobile-collapsible" id="sidebar-extra">
      <div class="sidebar-section">
        <div class="sidebar-label">Source file</div>
        <div class="check-group">
          <label class="check-item"><input type="checkbox" value="worldserver.conf.dist" checked> worldserver</label>
          <label class="check-item"><input type="checkbox" value="playerbots.conf.dist" checked> playerbots</label>
          <label class="check-item"><input type="checkbox" value="mod_ahbot.conf.dist" checked> mod_ahbot</label>
          <label class="check-item"><input type="checkbox" value="individualProgression.conf.dist" checked> individualProgression</label>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Display</div>
        <label class="toggle-item">
          <input type="checkbox" id="only-modified" checked>
          <span class="toggle-label-wrap"><span>Show only modified</span></span>
        </label>
        <label class="toggle-item">
          <input type="checkbox" id="show-meta">
          <span class="toggle-label-wrap"><span>Show source &amp; flags</span></span>
        </label>
        <label class="toggle-item">
          <input type="checkbox" id="only-pending">
          <span class="toggle-label-wrap"><span>Show pending changes</span></span>
        </label>
      </div>

      <div id="result-count"></div>
    </div>

    <div class="sidebar-actions">
      <button class="btn btn-apply" id="apply-btn" disabled>Apply <span class="pending-badge" id="pending-count">0</span></button>
      <button class="btn btn-rollback" id="rollback-btn">Rollback last apply</button>
    </div>
  </aside>

  <div class="settings-list-wrapper">
    <div id="key-list-header" class="key-list-header">
      <span>Key</span>
      <span>Value</span>
    </div>
    <main class="settings-list" id="key-list"><p class="loading">Loading settings…</p></main>
  </div>

  <aside class="settings-detail" id="key-detail">
    <p style="color:var(--text-dim);font-size:0.88rem;padding:1rem;">Select a key to see details.</p>
  </aside>

</div>

<dialog id="apply-dialog">
  <h2>Apply changes</h2>
  <pre id="apply-diff"></pre>
  <div class="dialog-actions">
    <button class="btn btn-apply" id="apply-confirm">Apply &amp; restart</button>
    <button class="btn btn-muted" id="apply-cancel">Cancel</button>
  </div>
</dialog>
<script src="/static/settings.js" defer></script>
{% endblock %}
