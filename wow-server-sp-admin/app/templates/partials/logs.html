<div class="panel">
  <h2>Logs</h2>
  <p>Errors.log: <strong>{{ errors_size }}</strong> bytes
    {% if errors_size == 0 %}(clean){% endif %}</p>
  <details><summary>Server.log (last {{ server_lines|length }} lines)</summary>
    <pre>{{ server_lines|join('\n') }}</pre>
  </details>
  <details><summary>Playerbots.log (last {{ pb_lines|length }} lines)</summary>
    <pre>{{ pb_lines|join('\n') }}</pre>
  </details>
</div>
