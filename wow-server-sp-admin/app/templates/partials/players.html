<div class="stat-card">
  <div class="stat-label">Online</div>
  {% if counts %}
  <div class="stat-value">{{ counts.real }} real · {{ counts.bots }} bots</div>
  {% else %}
  <div class="stat-value" style="color:var(--text-muted)">—</div>
  <div class="stat-sub">DB unreachable</div>
  {% endif %}
</div>
