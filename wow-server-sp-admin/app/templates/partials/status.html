<div class="stat-card">
  <div class="stat-label">Server Status</div>
  <div class="stat-value status-{{ status }}">{{ status|upper }}</div>
  {% if started_at_human != "—" %}
  <div class="stat-sub">Started: {{ started_at_human }}</div>
  {% endif %}
  {% if exit_code is not none and status != "running" %}
  <div class="stat-sub">Last exit: {{ exit_code }}</div>
  {% endif %}
</div>
