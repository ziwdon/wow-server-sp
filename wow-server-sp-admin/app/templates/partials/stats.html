<div class="stat-card">
  <div class="stat-label">Resources</div>
  {% if stats %}
  <div class="stat-value">{{ stats.cpu_percent }}% CPU · {{ stats.memory_used_mb }} / {{ stats.memory_limit_mb }} MB</div>
  <div class="stat-sub">Uptime: {{ uptime }}</div>
  {% else %}
  <div class="stat-value" style="color:var(--text-muted)">—</div>
  <div class="stat-sub">Container not running</div>
  {% endif %}
</div>
