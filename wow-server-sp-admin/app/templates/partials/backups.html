<div class="stat-card">
  <div class="stat-label">Last Backup</div>
  {% if last_backup_human %}
  <div class="stat-value">{{ last_backup_human }}</div>
  {% if last_error %}
  <div class="stat-sub" style="color:var(--red)">{{ last_error }}</div>
  {% else %}
  <div class="stat-sub">no errors</div>
  {% endif %}
  {% else %}
  <div class="stat-value" style="color:var(--text-muted)">No backups</div>
  {% endif %}
</div>
