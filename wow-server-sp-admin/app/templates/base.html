<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ title }}</title>
<link rel="stylesheet" href="/static/app.css?v={{ css_ver }}">
<script src="/static/htmx.min.js" defer></script>
<script src="/static/htmx-sse.js" defer></script>
</head>
<body>
<nav class="topnav">
  <a class="nav-brand" href="/"><span class="nav-icon">⚔</span> AzerothCore Admin</a>
  <div class="nav-links">
    <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">Dashboard</a>
    <a class="nav-link {% if request.url.path == '/stats' %}active{% endif %}" href="/stats">Stats</a>
    <a class="nav-link {% if request.url.path == '/settings' %}active{% endif %}" href="/settings">Settings</a>
    <a class="nav-link {% if request.url.path == '/backups' %}active{% endif %}" href="/backups">Backups</a>
  </div>
  <div class="nav-right">
    <span id="last-refresh"></span>
    <span id="nav-status-pill"
          class="status-pill"
          hx-get="/api/status"
          hx-trigger="load, every 10s"
          hx-swap="none">● —</span>
  </div>
</nav>
<main>{% block main %}{% endblock %}</main>
<script>
  document.addEventListener('htmx:afterRequest', function(e) {
    if (e.detail.elt && e.detail.elt.id === 'nav-status-pill') {
      var tmp = document.createElement('div');
      tmp.innerHTML = e.detail.xhr.responseText;
      var statusEl = tmp.querySelector('[class*="status-"]');
      var pill = document.getElementById('nav-status-pill');
      if (statusEl && pill) {
        pill.textContent = '● ' + statusEl.textContent.trim().replace(/^[●\s]+/, '');
        var statusCls = Array.from(statusEl.classList).find(function(c) { return c.startsWith('status-') && c !== 'status-pill'; });
        pill.className = 'status-pill' + (statusCls ? ' ' + statusCls : '');
      }
    }
  });
  document.addEventListener('htmx:afterSwap', function(e) {
    if (e.detail.target && e.detail.target.id === 'status') {
      const now = new Date();
      const ts = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
      const ref = document.getElementById('last-refresh');
      if (ref) ref.textContent = 'Last refresh: ' + ts;
    }
  });
</script>
</body>
</html>
