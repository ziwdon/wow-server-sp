# wow-server-sp-admin runtime stack.
# Lives at /opt/stacks/azerothcore-admin/ on the host after install.

services:
  azerothcore-admin:
    container_name: azerothcore-admin
    # Redeploy builds a uniquely tagged candidate before replacing the live
    # container. Normal installs keep the stable local tag.
    image: "${ADMIN_IMAGE:-azerothcore-admin:local}"
    build:
      context: .
      args:
        HOST_UID: "${HOST_UID:-1000}"
        HOST_GID: "${HOST_GID:-1000}"
    restart: unless-stopped
    # The non-root admin user (UID=HOST_UID) needs membership in a group
    # whose GID matches the host's docker group so it can read/write the
    # bind-mounted /var/run/docker.sock. The installer resolves the host's
    # docker GID into DOCKER_GID and writes it to .env. Without this the
    # container's first docker SDK call dies with PermissionError(13).
    group_add:
      - "${DOCKER_GID:-999}"
    ports:
      - "${TAILSCALE_IP}:${ADMIN_PORT:-8765}:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/stacks/azerothcore:/ac:ro
      # rw sub-mount: the one file the admin writes during Apply.
      - type: bind
        source: /opt/stacks/azerothcore/docker-compose.admin.yml
        target: /ac/docker-compose.admin.yml
        read_only: false
        bind:
          create_host_path: false
      # rw sub-mount: where the admin writes mysqldump output during
      # Stop/Restart. The parent /ac is ro; backups/ is the only other
      # path that needs admin-side writes.
      - /opt/stacks/azerothcore/backups:/ac/backups:rw
      # rw mount for admin.yml.bak.<ts> snapshots. Deliberately OUTSIDE
      # /ac/ because /ac is ro and writing a sibling-file snapshot next
      # to /ac/docker-compose.admin.yml would hit "read-only file system".
      # Lives in the admin stack dir so the AC installer is unaware of it.
      - /opt/stacks/azerothcore-admin/snapshots:/admin-snapshots:rw
      # rw mount for admin-owned runtime state such as maintenance schedules.
      - /opt/stacks/azerothcore-admin/data:/admin-data:rw
    environment:
      AC_STACK_DIR: /ac
      ADMIN_SNAPSHOTS_DIR: /admin-snapshots
      ADMIN_DATA_DIR: /admin-data
      ADMIN_LOG_LEVEL: info
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - azerothcore_ac-network

networks:
  # The AC stack's docker-compose.yml declares `networks: ac-network` and
  # every AC service joins it. With COMPOSE_PROJECT_NAME=azerothcore the
  # resulting Docker network is `azerothcore_ac-network`. We join it as
  # external so we get Docker-DNS resolution for `ac-database` and
  # `ac-worldserver`. Joining `azerothcore_default` would NOT work -- that
  # network exists (Compose creates one even when unused) but has no AC
  # services attached.
  azerothcore_ac-network:
    external: true
